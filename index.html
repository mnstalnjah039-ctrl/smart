<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mėntality - Mental Health Tools</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand-green': '#9fff00',
            'bg-base': '#EDEEF5',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Framer Motion -->
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

  <style>
    body {
      background-color: #EDEEF5;
      color: #1a1a1a;
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-bg-base text-zinc-900 font-sans antialiased selection:bg-brand-green selection:text-black">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { motion, AnimatePresence } = window.Motion;

    // --- 1. Navbar Component ---
    const Navbar = () => {
      const [isMobileOpen, setIsMobileOpen] = useState(false);

      return (
        <React.Fragment>
          <nav className="fixed top-0 left-0 w-full z-50 py-6 md:py-10 bg-gradient-to-b from-[#EDEEF5]/90 to-transparent backdrop-blur-[2px]">
            <div className="grid grid-cols-12 max-w-7xl mx-auto px-6 md:px-8 items-center">
              
              {/* Left (Cols 1-3) */}
              <div className="col-span-8 md:col-span-3 flex items-center gap-2">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 2C12 2 9 6 9 10C9 11.6569 10.3431 13 12 13C13.6569 13 15 11.6569 15 10C15 6 12 2 12 2Z" fill="#1a1a1a"/>
                  <path d="M22 12C22 12 18 9 14 9C12.3431 9 11 10.3431 11 12C11 13.6569 12.3431 15 14 15C18 15 22 12 22 12Z" fill="#1a1a1a"/>
                  <path d="M12 22C12 22 15 18 15 14C15 12.3431 13.6569 11 12 11C10.3431 11 9 12.3431 9 14C9 18 12 22 12 22Z" fill="#1a1a1a"/>
                  <path d="M2 12C2 12 6 15 10 15C11.6569 15 13 13.6569 13 12C13 10.3431 11.6569 9 10 9C6 9 2 12 2 12Z" fill="#1a1a1a"/>
                </svg>
                <span className="font-display font-semibold text-xl tracking-tight">mėntality</span>
              </div>

              {/* Center (Cols 4-9) */}
              <div className="hidden md:flex col-span-6 justify-center items-center gap-8 text-sm lowercase text-[#1a1a1a]/80 font-medium tracking-wide">
                <a href="#" className="hover:text-black transition-colors">service</a>
                <a href="#" className="hover:text-black transition-colors">patient resources</a>
                <a href="#" className="hover:text-black transition-colors">about us</a>
                <a href="#" className="hover:text-black transition-colors">education center</a>
              </div>

              {/* Right (Cols 10-12) */}
              <div className="col-span-4 md:col-span-3 flex justify-end items-center gap-4">
                <a href="#" className="hidden lg:block text-sm lowercase font-medium hover:text-black transition-colors">find help</a>
                <button className="hidden md:flex bg-[#1a1a1a] text-white text-sm font-medium px-5 py-2.5 rounded-full items-center gap-2 hover:bg-black transition-colors">
                  get started <span>&rarr;</span>
                </button>
                {/* Mobile Toggle */}
                <button className="md:hidden flex flex-col gap-1.5 z-50 relative" onClick={() => setIsMobileOpen(!isMobileOpen)}>
                   <motion.div animate={{ rotate: isMobileOpen ? 45 : 0, y: isMobileOpen ? 8 : 0 }} className="w-6 h-0.5 bg-black"></motion.div>
                   <motion.div animate={{ opacity: isMobileOpen ? 0 : 1 }} className="w-6 h-0.5 bg-black"></motion.div>
                   <motion.div animate={{ rotate: isMobileOpen ? -45 : 0, y: isMobileOpen ? -8 : 0 }} className="w-6 h-0.5 bg-black"></motion.div>
                </button>
              </div>

            </div>
          </nav>

          {/* Mobile Drawer */}
          <AnimatePresence>
            {isMobileOpen && (
              <motion.div 
                initial={{ opacity: 0, y: -20 }}
                animate={{ opacity: 1, y: 0 }}
                exit={{ opacity: 0, y: -20 }}
                className="fixed top-0 left-0 w-full h-screen bg-bg-base z-40 flex flex-col items-center justify-center gap-8"
              >
                <a href="#" className="text-2xl font-display lowercase">service</a>
                <a href="#" className="text-2xl font-display lowercase">patient resources</a>
                <a href="#" className="text-2xl font-display lowercase">about us</a>
                <a href="#" className="text-2xl font-display lowercase">education center</a>
                <button className="mt-4 bg-[#1a1a1a] text-white px-6 py-3 rounded-full flex items-center gap-2">
                  get started &rarr;
                </button>
              </motion.div>
            )}
          </AnimatePresence>
        </React.Fragment>
      );
    };

    // --- 2. Hero Component ---
    const Hero = () => {
      return (
        <section className="relative min-h-[110vh] sm:min-h-[140vh] w-full flex flex-col items-center justify-start overflow-hidden bg-bg-base pt-[25vh] md:pt-[30vh]">
          
          {/* Architectural Edge Anchors */}
          <div className="absolute top-1/2 right-4 -translate-y-1/2 z-20 flex flex-col gap-2">
            <div className="bg-white/40 backdrop-blur-md border border-white/20 rounded-full px-2 py-4 flex flex-col items-center gap-3 text-xs font-medium text-[#1a1a1a]/60">
              <button className="hover:text-black">pl</button>
              <div className="w-4 h-[1px] bg-black/10"></div>
              <button className="text-black">en</button>
            </div>
          </div>
          
          <div className="absolute bottom-8 left-8 z-20 text-xs font-medium text-[#1a1a1a]/50">
            2024
          </div>
          <div className="absolute bottom-8 right-8 z-20 text-xs font-medium text-[#1a1a1a]/50 lowercase">
            mental health tools
          </div>

          {/* Background Video Container */}
          <div className="absolute top-[15vh] sm:top-[20vh] left-0 w-full h-[95vh] sm:h-[120vh] z-0 pointer-events-none">
            <div className="absolute top-0 left-0 w-full h-24 sm:h-32 bg-gradient-to-b from-bg-base to-transparent z-10"></div>
            <video 
              autoPlay 
              loop 
              muted 
              playsInline 
              className="w-full h-full object-cover opacity-100"
              src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260603_132049_036591b8-6e92-4760-b94c-a7ea6eef315c.mp4"
            />
          </div>

          {/* Hero Content Alignment */}
          <div className="max-w-7xl w-full mx-auto px-8 md:px-16 lg:px-20 relative z-10 grid grid-cols-12 gap-x-4 md:gap-x-8">
            <div className="col-span-12 md:col-span-10 md:col-start-2 flex flex-col items-start">
              
              <motion.h1 
                initial={{ opacity: 0, y: 15 }}
                animate={{ opacity: 1, y: 0 }}
                transition={{ duration: 0.8, ease: "easeOut" }}
                className="text-4xl md:text-6xl lg:text-[76px] leading-[1.1] font-display font-medium tracking-tight"
              >
                <span className="text-[#1a1a1a]">Remix: Mentality offers</span><br/>
                <span className="text-[#8e8e8e]">information</span><br/>
                <span className="text-[#8e8e8e]">and resources to help you manage</span><br/>
                <span className="text-[#8e8e8e]">
                  your 
                  {/* Eye Icon Pill UI Element */}
                  <span className="w-[36px] md:w-[52px] lg:w-[72px] h-[36px] md:h-[52px] lg:h-[72px] border-[2px] border-[#1a1a1a] rounded-full inline-flex items-center justify-center mx-2 lg:mx-4 translate-y-2 lg:translate-y-4 bg-transparent shadow-[inset_0_2px_4px_rgba(0,0,0,0.05)]">
                    <span className="w-2 md:w-3 h-2 md:h-3 bg-[#1a1a1a] rounded-full"></span>
                  </span>
                  mental wellbeing.
                </span>
              </motion.h1>

              {/* Search Pill Component */}
              <motion.div 
                initial={{ opacity: 0, y: 15 }}
                animate={{ opacity: 1, y: 0 }}
                transition={{ duration: 0.8, delay: 0.15, ease: "easeOut" }}
                className="mt-8 md:mt-12 bg-white rounded-[6px] border border-black/[0.05] p-1 pl-4 flex items-center shadow-sm w-full max-w-sm"
              >
                <input 
                  type="text" 
                  placeholder="Ask me anything..." 
                  className="bg-transparent flex-grow outline-none text-sm text-[#1a1a1a] placeholder:text-black/30"
                />
                <button className="bg-[#1a1a1a] text-white w-9 h-9 rounded-[4px] relative flex items-center justify-center hover:bg-black transition-colors">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </button>
              </motion.div>

            </div>
          </div>
        </section>
      );
    };

    // --- 3. Tools Section (The Added Requirement) ---
    const ToolsSection = () => {
      const tools = [
        {
          id: 1,
          title: "Mood Tracker",
          arabic: "متتبع المزاج",
          desc: "Log your daily emotions to find patterns in your wellbeing.",
          icon: "📊"
        },
        {
          id: 2,
          title: "Breathing Timer",
          arabic: "تمارين التنفس",
          desc: "Quick 3-minute guided sessions to reduce anxiety and stress.",
          icon: "🌬️"
        },
        {
          id: 3,
          title: "Mindful Journal",
          arabic: "يوميات التفكير",
          desc: "A safe space to write down your thoughts and clear your mind.",
          icon: "📓"
        }
      ];

      return (
        <section className="w-full bg-bg-base py-20 px-8 relative z-20">
          <div className="max-w-7xl mx-auto">
             <div className="mb-12">
               <h2 className="text-3xl font-display font-semibold text-[#1a1a1a] mb-2">Mental Health Tools</h2>
               <p className="text-[#8e8e8e] max-w-2xl">Discover our suite of integrated tools designed to support your daily journey towards better mental health.</p>
             </div>
             
             <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                {tools.map((tool, idx) => (
                  <motion.div 
                    key={tool.id}
                    initial={{ opacity: 0, y: 20 }}
                    whileInView={{ opacity: 1, y: 0 }}
                    transition={{ duration: 0.5, delay: idx * 0.1 }}
                    viewport={{ once: true }}
                    className="bg-white/60 backdrop-blur-lg border border-white p-6 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] hover:-translate-y-1 transition-transform cursor-pointer group"
                  >
                    <div className="w-12 h-12 bg-[#EDEEF5] rounded-full flex items-center justify-center text-xl mb-6 group-hover:scale-110 transition-transform">
                      {tool.icon}
                    </div>
                    <h3 className="text-lg font-semibold text-[#1a1a1a] mb-1">{tool.title}</h3>
                    <p className="text-xs text-brand-green font-medium mb-3">{tool.arabic}</p>
                    <p className="text-sm text-[#8e8e8e] leading-relaxed">{tool.desc}</p>
                  </motion.div>
                ))}
             </div>
          </div>
        </section>
      );
    };

    // --- 4. Main App Container ---
    const App = () => {
      return (
        <div className="min-h-screen bg-bg-base selection:bg-brand-green selection:text-black font-sans">
          <Navbar />
          <main>
            <Hero />
            <ToolsSection />
          </main>
        </div>
      );
    };

    // Render the App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
