<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سمارت تولز - Smart Tools</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand-green': '#9fff00',
            'bg-base': '#EDEEF5',
          },
          fontFamily: {
            sans: ['Tajawal', 'Inter', 'sans-serif'], 
            display: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

  <style>
    body { background-color: #EDEEF5; color: #1a1a1a; overflow-x: hidden; }
    .glass-panel {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    .en-text { font-family: 'Inter', sans-serif; }
    .en-display { font-family: 'Outfit', sans-serif; }
  </style>
</head>
<body class="bg-bg-base text-zinc-900 font-sans antialiased selection:bg-brand-green selection:text-black">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { motion, AnimatePresence } = window.Motion;

    // --- 1. Navbar (Original Design Maintained) ---
    const Navbar = () => {
      const [isMobileOpen, setIsMobileOpen] = useState(false);
      return (
        <React.Fragment>
          <nav className="fixed top-0 left-0 w-full z-50 py-6 md:py-10 bg-gradient-to-b from-[#f1f1f1]/80 to-transparent backdrop-blur-[2px]" dir="ltr">
            <div className="grid grid-cols-12 max-w-7xl mx-auto px-6 md:px-8 items-center">
              <div className="col-span-8 md:col-span-3 flex items-center gap-2">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 2C12 2 9 6 9 10C9 11.6569 10.3431 13 12 13C13.6569 13 15 11.6569 15 10C15 6 12 2 12 2Z" fill="#1a1a1a"/>
                  <path d="M22 12C22 12 18 9 14 9C12.3431 9 11 10.3431 11 12C11 13.6569 12.3431 15 14 15C18 15 22 12 22 12Z" fill="#1a1a1a"/>
                  <path d="M12 22C12 22 15 18 15 14C15 12.3431 13.6569 11 12 11C10.3431 11 9 12.3431 9 14C9 18 12 22 12 22Z" fill="#1a1a1a"/>
                  <path d="M2 12C2 12 6 15 10 15C11.6569 15 13 13.6569 13 12C13 10.3431 11.6569 9 10 9C6 9 2 12 2 12Z" fill="#1a1a1a"/>
                </svg>
                <span className="font-display font-semibold text-xl tracking-tight">SmartTools</span>
              </div>
              <div className="hidden md:flex col-span-6 justify-center items-center gap-8 text-sm lowercase text-[#1a1a1a]/80 font-medium tracking-wide en-text">
                <a href="#tools" className="hover:text-black transition-colors">tools</a>
                <a href="#contact" className="hover:text-black transition-colors">contact us</a>
                <a href="#about" className="hover:text-black transition-colors">about us</a>
              </div>
              <div className="col-span-4 md:col-span-3 flex justify-end items-center gap-4">
                <a href="#tools" className="hidden lg:block text-sm lowercase font-medium hover:text-black transition-colors en-text">find tools</a>
                <button className="hidden md:flex bg-[#1a1a1a] text-white text-sm font-medium px-5 py-2.5 rounded-full items-center gap-2 hover:bg-black transition-colors en-text">
                  get started <span>&rarr;</span>
                </button>
                <button className="md:hidden flex flex-col gap-1.5 z-50 relative" onClick={() => setIsMobileOpen(!isMobileOpen)}>
                   <motion.div animate={{ rotate: isMobileOpen ? 45 : 0, y: isMobileOpen ? 8 : 0 }} className="w-6 h-0.5 bg-black"></motion.div>
                   <motion.div animate={{ opacity: isMobileOpen ? 0 : 1 }} className="w-6 h-0.5 bg-black"></motion.div>
                   <motion.div animate={{ rotate: isMobileOpen ? -45 : 0, y: isMobileOpen ? -8 : 0 }} className="w-6 h-0.5 bg-black"></motion.div>
                </button>
              </div>
            </div>
          </nav>
        </React.Fragment>
      );
    };

    // --- 2. Hero Component (Original Prompt Animations & Design) ---
    const Hero = () => {
      return (
        <section className="relative min-h-[110vh] sm:min-h-[140vh] w-full flex flex-col items-center justify-start overflow-hidden bg-bg-base pt-[25vh] md:pt-[30vh]" dir="ltr">
          <div className="absolute top-1/2 right-4 -translate-y-1/2 z-20 flex flex-col gap-2">
            <div className="bg-white/40 backdrop-blur-md border border-white/20 rounded-full px-2 py-4 flex flex-col items-center gap-3 text-xs font-medium text-[#1a1a1a]/60 en-text">
              <button className="hover:text-black">ar</button>
              <div className="w-4 h-[1px] bg-black/10"></div>
              <button className="text-black">en</button>
            </div>
          </div>
          <div className="absolute bottom-8 left-8 z-20 text-xs font-medium text-[#1a1a1a]/50 en-text">2026</div>
          <div className="absolute bottom-8 right-8 z-20 text-xs font-medium text-[#1a1a1a]/50 lowercase en-text">smart digital tools</div>

          <div className="absolute top-[15vh] sm:top-[20vh] left-0 w-full h-[95vh] sm:h-[120vh] z-0 pointer-events-none">
            <div className="absolute top-0 left-0 w-full h-24 sm:h-32 bg-gradient-to-b from-bg-base to-transparent z-10"></div>
            <video autoPlay loop muted playsInline className="w-full h-full object-cover opacity-100" src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260603_132049_036591b8-6e92-4760-b94c-a7ea6eef315c.mp4" />
          </div>

          <div className="max-w-7xl w-full mx-auto px-8 md:px-16 lg:px-20 relative z-10 grid grid-cols-12 gap-x-4 md:gap-x-8">
            <div className="col-span-12 md:col-span-10 md:col-start-2 flex flex-col items-start">
              <motion.h1 
                initial={{ opacity: 0, y: 15 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.8, ease: "easeOut" }}
                className="text-4xl md:text-6xl lg:text-[76px] leading-[1.1] font-display font-medium tracking-tight en-display"
              >
                <span className="text-[#1a1a1a]">Remix: Mentality offers</span><br/>
                <span className="text-[#8e8e8e]">information</span><br/>
                <span className="text-[#8e8e8e]">and resources to help you manage</span><br/>
                <span className="text-[#8e8e8e]">
                  your 
                  <span className="w-[36px] md:w-[52px] lg:w-[72px] h-[36px] md:h-[52px] lg:h-[72px] border-[2px] border-[#1a1a1a] rounded-full inline-flex items-center justify-center mx-2 lg:mx-4 translate-y-2 lg:translate-y-4 bg-transparent shadow-[inset_0_2px_4px_rgba(0,0,0,0.05)]">
                    <span className="w-2 md:w-3 h-2 md:h-3 bg-[#1a1a1a] rounded-full"></span>
                  </span>
                  mental wellbeing.
                </span>
              </motion.h1>

              <motion.div 
                initial={{ opacity: 0, y: 15 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.8, delay: 0.15, ease: "easeOut" }}
                className="mt-8 md:mt-12 bg-white rounded-[6px] border border-black/[0.05] p-1 pl-4 flex items-center shadow-sm w-full max-w-sm"
              >
                <input type="text" placeholder="Ask me anything..." className="bg-transparent flex-grow outline-none text-sm text-[#1a1a1a] placeholder:text-black/30 en-text"/>
                <button className="bg-[#1a1a1a] text-white w-9 h-9 rounded-[4px] relative flex items-center justify-center hover:bg-black transition-colors">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </button>
              </motion.div>
            </div>
          </div>
        </section>
      );
    };

    // --- 3. Tools Components ---
    const ToolPDF = () => {
      const [status, setStatus] = useState('idle');
      return (
        <div className="space-y-4 text-right">
          <h3 className="font-bold text-xl">ضغط ملفات PDF (متوافق حكومياً)</h3>
          <p className="text-sm text-gray-500">للمنصات الحكومية كجدارات وأبشر.</p>
          <div className="border-2 border-dashed border-gray-300 p-8 rounded-xl text-center bg-white hover:bg-gray-50 cursor-pointer">
            <span className="text-2xl">📄</span><br/> اسحب أو اضغط لرفع الملف
          </div>
          <select className="w-full p-3 rounded-lg border border-gray-200">
            <option>أقصى حجم: 2 ميجابايت (موصى به للمنصات الحكومية)</option>
            <option>أقصى حجم: 4 ميجابايت (جودة أعلى)</option>
          </select>
          <button onClick={() => { setStatus('loading'); setTimeout(() => setStatus('done'), 2000); }} className="w-full bg-[#1a1a1a] text-white py-3 rounded-lg">
            {status === 'idle' ? 'بدء الضغط' : status === 'loading' ? 'جاري المعالجة...' : 'تم الضغط والتنزيل بنجاح!'}
          </button>
        </div>
      );
    };

    const ToolQR = () => {
      const [mode, setMode] = useState('toQR'); // toQR or fromQR
      const [url, setUrl] = useState('');
      
      return (
        <div className="space-y-4 text-right">
          <div className="flex bg-gray-100 rounded-lg p-1">
            <button onClick={()=>setMode('toQR')} className={`flex-1 py-2 rounded-md text-sm font-bold ${mode==='toQR'?'bg-white shadow':''}`}>رابط إلى QR</button>
            <button onClick={()=>setMode('fromQR')} className={`flex-1 py-2 rounded-md text-sm font-bold ${mode==='fromQR'?'bg-white shadow':''}`}>QR إلى رابط</button>
          </div>
          
          {mode === 'toQR' ? (
            <div className="space-y-4">
              <input type="text" value={url} onChange={(e)=>setUrl(e.target.value)} placeholder="https://domain.com..." className="w-full p-3 rounded-lg border border-gray-200 text-left" dir="ltr" />
              <div className="flex justify-center p-4 bg-white rounded-xl border border-gray-100">
                {url ? <img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`} alt="QR" /> : <div className="h-[200px] flex items-center text-gray-400">أدخل الرابط أولاً</div>}
              </div>
            </div>
          ) : (
            <div className="space-y-4">
               <div className="border-2 border-dashed border-gray-300 p-8 rounded-xl text-center bg-white">
                <span className="text-2xl">📷</span><br/> ارفع صورة QR Code لقرائتها
              </div>
              <button className="w-full bg-gray-200 text-gray-700 py-3 rounded-lg cursor-not-allowed">استخراج الرابط</button>
            </div>
          )}
        </div>
      );
    };

    const ToolBMI = () => {
      const [h, setH] = useState(''); const [w, setW] = useState(''); const [res, setRes] = useState(null);
      return (
        <div className="space-y-4 text-right">
          <h3 className="font-bold text-xl">حاسبة كتلة الجسم (BMI)</h3>
          <div className="flex gap-4">
            <input type="number" placeholder="الطول (سم)" onChange={e=>setH(e.target.value)} className="w-1/2 p-3 rounded-lg border border-gray-200"/>
            <input type="number" placeholder="الوزن (كجم)" onChange={e=>setW(e.target.value)} className="w-1/2 p-3 rounded-lg border border-gray-200"/>
          </div>
          <button onClick={() => {
            if(h && w) {
              const bmi = (w / Math.pow(h/100, 2)).toFixed(1);
              setRes(`${bmi} - ${bmi < 18.5 ? 'نقص وزن' : bmi < 25 ? 'وزن طبيعي' : 'زيادة وزن'}`);
            }
          }} className="w-full bg-[#1a1a1a] text-white py-3 rounded-lg">احسب</button>
          {res && <div className="p-4 bg-green-50 text-green-800 rounded-lg text-center font-bold text-xl">{res}</div>}
        </div>
      );
    };

    const ToolAge = () => {
      const [dob, setDob] = useState(''); const [age, setAge] = useState(null);
      return (
        <div className="space-y-4 text-right">
          <h3 className="font-bold text-xl">حاسبة العمر</h3>
          <input type="date" onChange={e=>setDob(e.target.value)} className="w-full p-3 rounded-lg border border-gray-200 text-right" dir="ltr"/>
          <button onClick={() => {
            if(dob) setAge(Math.abs(new Date(Date.now() - new Date(dob).getTime()).getUTCFullYear() - 1970));
          }} className="w-full bg-[#1a1a1a] text-white py-3 rounded-lg">احسب عمري</button>
          {age !== null && <div className="p-4 bg-blue-50 text-blue-800 rounded-lg text-center font-bold text-xl">عمرك: {age} سنة</div>}
        </div>
      );
    };

    const ToolPassword = () => {
      const [pass, setPass] = useState('');
      return (
        <div className="space-y-4 text-right">
          <h3 className="font-bold text-xl">مولد كلمات المرور</h3>
          <button onClick={() => {
            const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
            setPass(Array.from({length:16}).map(()=>chars[Math.floor(Math.random()*chars.length)]).join(''));
          }} className="w-full bg-[#1a1a1a] text-white py-3 rounded-lg">توليد كلمة سر معقدة</button>
          {pass && <div className="p-4 bg-gray-100 rounded-lg text-center font-mono text-xl tracking-widest border border-gray-300 en-text">{pass}</div>}
        </div>
      );
    };

    const ToolTempEmail = () => {
      const [email, setEmail] = useState('');
      return (
        <div className="space-y-4 text-right">
          <h3 className="font-bold text-xl">بريد إلكتروني مؤقت</h3>
          <p className="text-sm text-gray-500">استخدم هذا البريد للتسجيل في المواقع دون تلقي رسائل مزعجة.</p>
          {!email ? (
            <button onClick={() => setEmail(`user${Math.floor(Math.random()*90000)}@smartdomain.temp`)} className="w-full bg-[#1a1a1a] text-white py-3 rounded-lg">توليد بريد عشوائي</button>
          ) : (
            <div className="space-y-4">
              <div className="p-3 bg-gray-100 rounded-lg text-center font-mono text-lg border border-gray-300 en-text">{email}</div>
              <div className="border border-gray-200 rounded-lg p-6 text-center text-gray-400 bg-gray-50">
                صندوق الوارد فارغ. بانتظار الرسائل... ⏳
              </div>
            </div>
          )}
        </div>
      );
    };

    const ToolGPA = () => {
      return (
        <div className="space-y-4 text-right">
          <h3 className="font-bold text-xl">حاسبة المعدل التراكمي (GPA)</h3>
          <div className="grid grid-cols-2 gap-4">
             <input type="number" placeholder="المعدل السابق" className="p-3 rounded-lg border border-gray-200"/>
             <input type="number" placeholder="الساعات المنجزة" className="p-3 rounded-lg border border-gray-200"/>
          </div>
          <p className="text-sm text-gray-500 mt-2">المواد الحالية:</p>
          <div className="flex gap-2">
             <input type="text" placeholder="ساعات المادة" className="w-1/2 p-3 rounded-lg border border-gray-200"/>
             <select className="w-1/2 p-3 rounded-lg border border-gray-200">
               <option>A+</option><option>A</option><option>B+</option><option>B</option><option>C</option>
             </select>
          </div>
          <button className="w-full bg-[#1a1a1a] text-white py-3 rounded-lg">حساب المعدل الجديد</button>
        </div>
      );
    };

    const ToolStudent = () => {
      return (
        <div className="space-y-4 text-right">
          <h3 className="font-bold text-xl">أدوات الطلاب (تلخيص نصوص)</h3>
          <textarea rows="4" placeholder="ألصق النص الطويل هنا لتلخيصه عبر الذكاء الاصطناعي..." className="w-full p-3 rounded-lg border border-gray-200"></textarea>
          <button className="w-full bg-[#1a1a1a] text-white py-3 rounded-lg">تلخيص النص</button>
        </div>
      );
    };

    // --- 4. Main Tools Grid ---
    const ToolsSection = () => {
      const [activeTool, setActiveTool] = useState(null);
      const toolsData = [
        { id: 'pdf', title: 'ضغط PDF', icon: '📄', comp: <ToolPDF/> },
        { id: 'qr', title: 'مولد/قارئ QR', icon: '🔗', comp: <ToolQR/> },
        { id: 'bmi', title: 'كتلة الجسم', icon: '⚖️', comp: <ToolBMI/> },
        { id: 'age', title: 'حاسبة العمر', icon: '⏳', comp: <ToolAge/> },
        { id: 'pass', title: 'كلمات سر', icon: '🔐', comp: <ToolPassword/> },
        { id: 'mail', title: 'بريد مؤقت', icon: '📧', comp: <ToolTempEmail/> },
        { id: 'gpa', title: 'حساب المعدل', icon: '🎓', comp: <ToolGPA/> },
        { id: 'student', title: 'تلخيص الطلاب', icon: '🎒', comp: <ToolStudent/> }
      ];

      return (
        <section id="tools" className="max-w-7xl mx-auto px-6 py-20 relative z-20">
          <div className="text-center mb-12">
            <h2 className="text-4xl font-bold mb-4">أدوات سمارت تولز الذكية</h2>
            <p className="text-gray-500">اختر الأداة التي تحتاجها لإنجاز مهامك بسرعة وكفاءة.</p>
          </div>
          
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
            {toolsData.map(t => (
              <button 
                key={t.id} 
                onClick={() => {setActiveTool(null); setTimeout(()=>setActiveTool(t), 50);}}
                className={`glass-panel p-6 rounded-2xl flex flex-col items-center gap-3 transition-all ${activeTool?.id === t.id ? 'ring-2 ring-[#1a1a1a] shadow-lg scale-105 bg-white' : 'hover:scale-105'}`}
              >
                <span className="text-3xl">{t.icon}</span>
                <span className="font-semibold text-sm md:text-base">{t.title}</span>
              </button>
            ))}
          </div>

          <AnimatePresence mode="wait">
            {activeTool && (
              <motion.div 
                key={activeTool.id}
                initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }}
                className="max-w-2xl mx-auto bg-white p-8 rounded-3xl shadow-xl border border-gray-100"
              >
                {activeTool.comp}
              </motion.div>
            )}
          </AnimatePresence>
        </section>
      );
    };

    // --- 5. Interactive Contact Form ---
    const ContactSection = () => {
      const [status, setStatus] = useState('idle');
      const handleSubmit = (e) => {
        e.preventDefault();
        setStatus('sending');
        setTimeout(() => setStatus('sent'), 1500);
      };

      return (
        <section id="contact" className="max-w-4xl mx-auto px-6 py-20 relative z-20">
          <div className="glass-panel p-8 md:p-12 rounded-3xl shadow-lg border border-white/60">
            <h2 className="text-3xl font-bold mb-2 text-center">تواصل معنا</h2>
            <p className="text-gray-500 text-center mb-8">أرسل لنا استفساراتك أو اقتراحاتك لتطوير أدوات جديدة.</p>
            
            {status === 'sent' ? (
              <motion.div initial={{ opacity:0 }} animate={{ opacity:1 }} className="text-center p-10 bg-brand-green/20 rounded-xl text-green-900 font-bold text-xl">
                تم إرسال رسالتك بنجاح! شكراً لتواصلك معنا. 🎉
              </motion.div>
            ) : (
              <form onSubmit={handleSubmit} className="space-y-6">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div>
                    <label className="block text-sm font-medium mb-2">الاسم الكريم</label>
                    <input required type="text" className="w-full p-4 rounded-xl border border-gray-200 bg-white/80 focus:ring-2 focus:ring-[#1a1a1a] outline-none" placeholder="محمد أحمد" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium mb-2">البريد الإلكتروني</label>
                    <input required type="email" className="w-full p-4 rounded-xl border border-gray-200 bg-white/80 focus:ring-2 focus:ring-[#1a1a1a] outline-none text-left" dir="ltr" placeholder="example@domain.com" />
                  </div>
                </div>
                <div>
                  <label className="block text-sm font-medium mb-2">رسالتك</label>
                  <textarea required rows="4" className="w-full p-4 rounded-xl border border-gray-200 bg-white/80 focus:ring-2 focus:ring-[#1a1a1a] outline-none" placeholder="اكتب رسالتك هنا..."></textarea>
                </div>
                <button type="submit" disabled={status==='sending'} className="w-full bg-[#1a1a1a] text-white py-4 rounded-xl font-bold text-lg hover:bg-black transition-colors">
                  {status === 'sending' ? 'جاري الإرسال...' : 'إرسال الرسالة'}
                </button>
              </form>
            )}
          </div>
        </section>
      );
    };

    // --- 6. SEO Footer ---
    const Footer = () => (
      <footer id="about" className="bg-white border-t border-gray-200 mt-20 py-12 px-6">
        <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
          <div>
            <div className="flex items-center gap-2 mb-4">
              <span className="font-bold text-xl en-display">SmartTools</span>
            </div>
            <p className="text-gray-500 text-sm">منصتك الشاملة لجميع الأدوات الرقمية التي تحتاجها للعمل، الدراسة، والصحة. واجهات سريعة وتصميم تفاعلي يخدمك في كل وقت.</p>
          </div>
          <div>
            <h4 className="font-bold text-[#1a1a1a] mb-4">الصفحات الأساسية (SEO)</h4>
