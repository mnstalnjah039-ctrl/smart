<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سمارت تولز - Smart Tools</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand-green': '#9fff00',
            'bg-base': '#EDEEF5',
          },
          fontFamily: {
            sans: ['Tajawal', 'Inter', 'sans-serif'], // Added Tajawal for better Arabic typography
            display: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

  <style>
    body { background-color: #EDEEF5; color: #1a1a1a; }
    .glass-panel {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body class="bg-bg-base text-zinc-900 font-sans antialiased selection:bg-brand-green selection:text-black">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { motion, AnimatePresence } = window.Motion;

    // --- 1. Navbar ---
    const Navbar = () => {
      return (
        <nav className="fixed top-0 left-0 w-full z-50 py-4 bg-gradient-to-b from-[#EDEEF5]/95 to-transparent backdrop-blur-sm">
          <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-[#1a1a1a] rounded-xl flex items-center justify-center text-white font-bold text-xl">S</div>
              <span className="font-bold text-2xl tracking-tight">سمارت تولز</span>
            </div>
            <div className="hidden md:flex gap-6 text-sm font-medium">
              <a href="#tools" className="hover:text-brand-green transition">الأدوات</a>
              <a href="#about" className="hover:text-brand-green transition">من نحن</a>
              <a href="#contact" className="hover:text-brand-green transition">الدعم الفني</a>
            </div>
          </div>
        </nav>
      );
    };

    // --- 2. Hero Section ---
    const Hero = () => {
      return (
        <section className="relative min-h-[80vh] w-full flex flex-col items-center justify-center overflow-hidden bg-bg-base pt-20">
          <div className="absolute top-0 left-0 w-full h-[80vh] z-0 pointer-events-none opacity-30">
             <video autoPlay loop muted playsInline className="w-full h-full object-cover" src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260603_132049_036591b8-6e92-4760-b94c-a7ea6eef315c.mp4" />
             <div className="absolute inset-0 bg-bg-base mix-blend-screen"></div>
          </div>
          
          <div className="relative z-10 max-w-4xl mx-auto text-center px-4">
            <motion.h1 
              initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.8 }}
              className="text-5xl md:text-7xl font-bold leading-tight"
            >
              أدوات <span className="text-[#8e8e8e]">ذكية</span><br/>
              لإنجاز مهامك <span className="inline-flex items-center justify-center w-12 h-12 border-4 border-[#1a1a1a] rounded-full translate-y-2 mx-2"><span className="w-3 h-3 bg-brand-green rounded-full"></span></span> اليومية
            </motion.h1>
            <motion.p 
              initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ delay: 0.3 }}
              className="mt-6 text-lg text-gray-600 max-w-2xl mx-auto"
            >
              منصة سمارت تولز توفر لك كل ما تحتاجه من أدوات معالجة الملفات، الحسابات الأكاديمية والصحية، وتوليد البيانات بأعلى كفاءة وسرعة.
            </motion.p>
          </div>
        </section>
      );
    };

    // --- 3. Individual Tool Components ---

    const ToolPDF = () => {
      const [status, setStatus] = useState('idle');
      const handleCompress = () => {
        setStatus('loading');
        setTimeout(() => setStatus('done'), 2000);
      };
      return (
        <div className="space-y-4 text-right">
          <h3 className="font-bold text-xl">ضغط ملفات PDF الحكومية</h3>
          <p className="text-sm text-gray-500">اختر نسبة الضغط لتتناسب مع متطلبات المنصات الحكومية (جدارات، أبشر، الخ).</p>
          <div className="border-2 border-dashed border-gray-300 p-8 rounded-xl text-center bg-white hover:bg-gray-50 cursor-pointer transition">
            <span className="text-2xl">📄</span><br/> اضغط هنا لرفع الملف
          </div>
          <select className="w-full p-3 rounded-lg border border-gray-200">
            <option>أقصى حجم: 2 ميجابايت (المنصات الحكومية)</option>
            <option>أقصى حجم: 4 ميجابايت (جودة متوسطة)</option>
          </select>
          <button onClick={handleCompress} className="w-full bg-[#1a1a1a] text-white py-3 rounded-lg hover:bg-black">
            {status === 'idle' ? 'بدء الضغط' : status === 'loading' ? 'جاري المعالجة...' : 'تم الضغط بنجاح!'}
          </button>
        </div>
      );
    };

    const ToolQR = () => {
      const [url, setUrl] = useState('https://google.com');
      return (
        <div className="space-y-4 text-right">
          <h3 className="font-bold text-xl">تحويل الروابط إلى QR Code</h3>
          <input type="text" value={url} onChange={(e)=>setUrl(e.target.value)} placeholder="أدخل الرابط هنا..." className="w-full p-3 rounded-lg border border-gray-200" dir="ltr" />
          <div className="flex justify-center p-4 bg-white rounded-xl">
             {url ? <img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`} alt="QR" /> : <div className="h-[200px] text-gray-400 flex items-center">أدخل رابطاً</div>}
          </div>
        </div>
      );
    };

    const ToolBMI = () => {
      const [h, setH] = useState(''); const [w, setW] = useState(''); const [res, setRes] = useState(null);
      const calc = () => { 
        if(h && w) {
          const m = h / 100; 
          const bmi = (w / (m * m)).toFixed(1);
          let text = bmi < 18.5 ? 'نقص وزن' : bmi < 25 ? 'وزن طبيعي' : 'زيادة وزن';
          setRes(`${bmi} - ${text}`);
        }
      };
      return (
        <div className="space-y-4 text-right">
          <h3 className="font-bold text-xl">حاسبة كتلة الجسم (BMI)</h3>
          <div className="flex gap-4">
            <input type="number" placeholder="الطول (سم)" onChange={e=>setH(e.target.value)} className="w-1/2 p-3 rounded-lg border border-gray-200"/>
            <input type="number" placeholder="الوزن (كجم)" onChange={e=>setW(e.target.value)} className="w-1/2 p-3 rounded-lg border border-gray-200"/>
          </div>
          <button onClick={calc} className="w-full bg-[#1a1a1a] text-white py-3 rounded-lg">احسب</button>
          {res && <div className="p-4 bg-green-50 text-green-800 rounded-lg text-center font-bold text-xl">{res}</div>}
        </div>
      );
    };

    const ToolAge = () => {
      const [dob, setDob] = useState(''); const [age, setAge] = useState(null);
      const calc = () => {
        if(!dob) return;
        const diff = Date.now() - new Date(dob).getTime();
        const ageDt = new Date(diff);
        setAge(Math.abs(ageDt.getUTCFullYear() - 1970));
      };
      return (
        <div className="space-y-4 text-right">
          <h3 className="font-bold text-xl">حاسبة العمر الدقيقة</h3>
          <input type="date" onChange={e=>setDob(e.target.value)} className="w-full p-3 rounded-lg border border-gray-200"/>
          <button onClick={calc} className="w-full bg-[#1a1a1a] text-white py-3 rounded-lg">احسب عمري</button>
          {age !== null && <div className="p-4 bg-blue-50 text-blue-800 rounded-lg text-center font-bold text-xl">عمرك هو: {age} سنة</div>}
        </div>
      );
    };

    const ToolPassword = () => {
      const [pass, setPass] = useState('');
      const gen = () => {
        const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
        let p = "";
        for(let i=0; i<16; i++) p += chars[Math.floor(Math.random() * chars.length)];
        setPass(p);
      };
      return (
        <div className="space-y-4 text-right">
          <h3 className="font-bold text-xl">مولد كلمات المرور الآمنة</h3>
          <button onClick={gen} className="w-full bg-[#1a1a1a] text-white py-3 rounded-lg">توليد كلمة سر جديدة</button>
          {pass && (
            <div className="p-4 bg-gray-100 rounded-lg text-center font-mono text-xl tracking-widest border border-gray-300">
              {pass}
            </div>
          )}
        </div>
      );
    };

    // --- 4. Main Tools Grid & Switcher ---
    const ToolsSection = () => {
      const [activeTool, setActiveTool] = useState(null);

      const toolsData = [
        { id: 'pdf', title: 'ضغط PDF حكومي', icon: '📄', comp: <ToolPDF/> },
        { id: 'qr', title: 'مولد كيو آر (QR)', icon: '🔗', comp: <ToolQR/> },
        { id: 'bmi', title: 'حاسبة كتلة الجسم', icon: '⚖️', comp: <ToolBMI/> },
        { id: 'age', title: 'حاسبة العمر', icon: '⏳', comp: <ToolAge/> },
        { id: 'pass', title: 'كلمات سر عشوائية', icon: '🔐', comp: <ToolPassword/> },
        { id: 'gpa', title: 'المعدل التراكمي', icon: '🎓', comp: <div className="text-center p-8">قريباً: حاسبة المعدل الجامعي والمدرسي</div> },
        { id: 'mail', title: 'بريد مؤقت', icon: '📧', comp: <div className="text-center p-8 text-gray-500">تم حجز هذه المساحة لربط أداة البريد المؤقت لاحقاً عبر الـ API</div> },
        { id: 'student', title: 'أدوات الطلاب', icon: '🎒', comp: <div className="text-center p-8">قريباً: تلخيص النصوص، وحاسبة الدرجات</div> }
      ];

      return (
        <section id="tools" className="max-w-7xl mx-auto px-6 py-20 relative z-20">
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
            {toolsData.map(t => (
              <button 
                key={t.id} 
                onClick={() => setActiveTool(t)}
                className={`glass-panel p-6 rounded-2xl flex flex-col items-center gap-3 transition-all ${activeTool?.id === t.id ? 'ring-2 ring-[#1a1a1a] shadow-lg scale-105 bg-white' : 'hover:scale-105'}`}
              >
                <span className="text-3xl">{t.icon}</span>
                <span className="font-semibold text-sm md:text-base">{t.title}</span>
              </button>
            ))}
          </div>

          <AnimatePresence mode="wait">
            {activeTool && (
              <motion.div 
                key={activeTool.id}
                initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }}
                className="max-w-2xl mx-auto bg-white p-8 rounded-3xl shadow-xl border border-gray-100"
              >
                {activeTool.comp}
              </motion.div>
            )}
          </AnimatePresence>
        </section>
      );
    };

    // --- 5. SEO Footer (Google Ads Requirements) ---
    const Footer = () => {
      return (
        <footer className="bg-white border-t border-gray-200 mt-20 py-12 px-6">
          <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
            <div>
              <div className="flex items-center gap-2 mb-4">
                <div className="w-8 h-8 bg-[#1a1a1a] rounded-lg flex items-center justify-center text-white font-bold">S</div>
                <span className="font-bold text-xl">سمارت تولز</span>
              </div>
              <p className="text-gray-500 text-sm">منصتك الشاملة لجميع الأدوات اليومية التي تحتاجها للعمل، الدراسة، والصحة. جميع الأدوات تعمل بكفاءة عالية للحفاظ على وقتك.</p>
            </div>
            
            <div>
              <h4 className="font-bold text-[#1a1a1a] mb-4">الصفحات الأساسية (Google)</h4>
              <ul className="space-y-2 text-sm text-gray-600">
                <li><a href="#" className="hover:text-brand-green">من نحن (About Us)</a></li>
                <li><a href="#" className="hover:text-brand-green">سياسة الخصوصية (Privacy Policy)</a></li>
                <li><a href="#" className="hover:text-brand-green">شروط الاستخدام (Terms of Service)</a></li>
                <li><a href="#" className="hover:text-brand-green">إخلاء المسؤولية (Disclaimer)</a></li>
              </ul>
            </div>

            <div>
              <h4 className="font-bold text-[#1a1a1a] mb-4">التواصل والدعم</h4>
              <ul className="space-y-2 text-sm text-gray-600">
                <li><a href="#" className="hover:text-brand-green">اتصل بنا (Contact Us)</a></li>
                <li>support@smarttools.com</li>
                <li className="mt-4 text-xs text-gray-400">© 2026 سمارت تولز. جميع الحقوق محفوظة.</li>
              </ul>
            </div>
          </div>
        </footer>
      );
    };

    // --- Main App ---
    const App = () => {
      return (
        <div className="min-h-screen">
          <Navbar />
          <Hero />
          <ToolsSection />
          <Footer />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
